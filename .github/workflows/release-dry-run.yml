name: Release Dry Run

on:
  workflow_dispatch:
  push:
    branches:
      - 'test-release-*'

jobs:
  dry-run:
    name: Release Gates Dry Run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: "GATE 1: Core Build"
        run: cargo build --release --features airframe && echo "✅ Build passed"

      - name: "GATE 2: Template Packaging"
        run: |
          cargo package --allow-dirty --list | grep -E "(^|[/\\\\])templates[/\\\\]docker[/\\\\]Dockerfile$" \
            && echo "✅ Templates included" || { echo "❌ Docker template missing"; exit 1; }

      - name: "GATE 3: Binary Size"
        run: |
          size=$(stat -c%s target/release/shimmy 2>/dev/null || echo "0")
          [ "$size" -gt "$((20 * 1024 * 1024))" ] && { echo "❌ Binary too large"; exit 1; }
          echo "✅ Binary size ${size} bytes"

      - name: "GATE 4: Test Suite"
        run: cargo test --lib --no-default-features -- --test-threads=1 && echo "✅ Tests passed"

      - name: "GATE 5: Documentation"
        run: cargo doc --no-deps --no-default-features && echo "✅ Docs built"

      - name: Done
        run: echo "✅ All dry-run gates passed"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dry-run-artifacts
          path: target/release/shimmy*
          retention-days: 7

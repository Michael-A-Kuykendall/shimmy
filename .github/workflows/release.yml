name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  preflight:
    name: "Release Gates"
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.gates.outputs.should_publish }}
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: "GATE 1: Core Build"
        run: |
          cargo build --release --features airframe
          echo "✅ Core build passed"

      - name: "GATE 2: Template Packaging"
        run: |
          if cargo package --allow-dirty --list | grep -E "(^|[/\\\\])templates[/\\\\]docker[/\\\\]Dockerfile$" > /dev/null; then
            echo "✅ Docker templates included"
          else
            echo "❌ Docker template missing"
            exit 1
          fi

      - name: "GATE 3: Binary Size (20MB limit)"
        run: |
          size=$(stat -c%s target/release/shimmy 2>/dev/null || echo "0")
          max_size=$((20 * 1024 * 1024))
          [ "$size" -gt "$max_size" ] && { echo "❌ Binary ${size} exceeds limit"; exit 1; }
          echo "✅ Binary size ${size} bytes"

      - name: "GATE 4: Test Suite"
        run: |
          cargo test --lib --no-default-features -- --test-threads=1
          echo "✅ Tests passing"

      - name: "GATE 5: Airframe Integration"
        run: |
          cargo check --features airframe
          echo "✅ Airframe compiles"

      - name: "GATE 6: Regression Tests"
        run: |
          cargo test --test regression_tests --no-default-features -- --test-threads=1
          echo "✅ Regression tests passed"

      - name: "GATE 7: Documentation"
        run: |
          cargo doc --no-deps --no-default-features
          echo "✅ Docs built"

      - name: "GATE 8: crates.io dry-run"
        run: |
          cargo publish --dry-run --allow-dirty 2>&1 | tee /tmp/publish_dry.txt
          grep -E "^error|cannot be published" /tmp/publish_dry.txt && exit 1 || true
          echo "✅ crates.io dry-run passed"

      - id: gates
        run: |
          echo "✅ All gates passed"
          echo "should_publish=true" >> $GITHUB_OUTPUT

      - name: Upload gate binary
        uses: actions/upload-artifact@v4
        with:
          name: gate-built-binary
          path: target/release/shimmy

  build:
    needs: preflight
    if: needs.preflight.outputs.should_publish == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            binary-name: shimmy
            artifact-name: shimmy-linux-aarch64
            features: airframe

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary-name: shimmy.exe
            artifact-name: shimmy-windows-x86_64.exe
            features: airframe

          - os: macos-latest
            target: x86_64-apple-darwin
            binary-name: shimmy
            artifact-name: shimmy-macos-intel
            features: airframe

          - os: macos-latest
            target: aarch64-apple-darwin
            binary-name: shimmy
            artifact-name: shimmy-macos-arm64
            features: airframe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: System dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev build-essential cmake

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        shell: bash
        env:
          MACOSX_DEPLOYMENT_TARGET: "12.0"
        run: |
          cargo build --release --target ${{ matrix.target }} --no-default-features --features "${{ matrix.features }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: target/${{ matrix.target }}/release/${{ matrix.binary-name }}

  release:
    needs: [preflight, build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') && needs.preflight.outputs.should_publish == 'true'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Prepare release files
        run: |
          mkdir -p release-files
          cp artifacts/gate-built-binary/shimmy release-files/shimmy-linux-x86_64
          cp artifacts/gate-built-binary/shimmy release-files/shimmy
          [ -f "artifacts/shimmy-linux-aarch64/shimmy" ] && cp artifacts/shimmy-linux-aarch64/shimmy release-files/shimmy-linux-aarch64 || true
          cp artifacts/shimmy-windows-x86_64.exe/shimmy.exe release-files/shimmy-windows-x86_64.exe
          cp artifacts/shimmy-windows-x86_64.exe/shimmy.exe release-files/shimmy.exe
          cp artifacts/shimmy-macos-intel/shimmy release-files/shimmy-macos-intel
          cp artifacts/shimmy-macos-arm64/shimmy release-files/shimmy-macos-arm64
          ls -lh release-files/

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view ${{ github.ref_name }} > /dev/null 2>&1; then
            gh release upload ${{ github.ref_name }} release-files/* --clobber
          else
            gh release create ${{ github.ref_name }} release-files/* \
              --title "Shimmy ${{ github.ref_name }}" \
              --generate-notes
          fi

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        if: startsWith(github.ref, 'refs/tags/')
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo publish || echo "ℹ️  Already published — skipping"
          echo "✅ Published shimmy to crates.io"

name: Schema Export Validation

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'src/**'
      - 'console/src/**'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'src/**'
      - 'console/src/**'
  workflow_dispatch:
    inputs:
      test_platform:
        description: 'Platform to test (ubuntu, windows, macos)'
        required: false
        default: 'ubuntu'
        type: choice
        options:
          - ubuntu
          - windows
          - macos
jobs:
  schema-export-validation:
    name: "📋 Schema Export Validation"
    env:
      EXPORT_SCHEMA_FILE: exported-shimmy-schema.json
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Python dependencies
        run: |
           python3 -m pip install --upgrade pip
           python3 -m pip install PyYAML

      - name: Cache Cargo registry
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-schema-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-schema-
            ${{ runner.os }}-cargo-

      - name: Build shimmy with console feature
        run: |
          echo "::group::Building shimmy for schema export"
          cargo build --features console --no-default-features
          echo "::endgroup::"

      - name: Export schema - use orchestrator (shimmy dev --verify)
        run: |
          echo "::group::Running orchestrator export (shimmy dev --verify)"
          if [ "${{ runner.os }}" = "Windows" ]; then
            .\\target\\debug\\shimmy.exe dev shimmy-default --verify --no-build
          else
            ./target/debug/shimmy dev shimmy-default --verify --no-build
          fi

          # Find the most recent JSON file generated in repo root and normalize it
          found=$(ls -1t *.json 2>/dev/null | head -n1 || true)
          if [ -n "$found" ]; then
            mv "$found" "$EXPORT_SCHEMA_FILE"
          fi

          echo "::endgroup::"
        shell: bash

      - name: Validate exported schema
        run: |
          echo "::group::Validating exported schema"

          # Ensure we have an export filename set
          EXPORT_SCHEMA_FILE="${EXPORT_SCHEMA_FILE:-exported-shimmy-schema.json}"

          # Check if schema file exists
          if [ ! -f "$EXPORT_SCHEMA_FILE" ]; then
            echo "❌ Schema file not found: $EXPORT_SCHEMA_FILE"
            exit 1
          fi

          # Basic sanity checks
          file_size=$(wc -c < "$EXPORT_SCHEMA_FILE")
          if [ "$file_size" -lt 100 ]; then
            echo "❌ Schema file is too small ($file_size bytes) - likely empty or malformed"
            exit 1
          fi

          echo "✅ Schema file size: $file_size bytes"

          # Validate JSON format and essential keys with a compact Python check
          if ! python3 -c "import json,sys; data=json.load(open('$EXPORT_SCHEMA_FILE')); [sys.exit(1) for k in ('openapi','info','paths') if k not in data]; print('✅ JSON valid, required keys present')"; then
            echo "❌ Schema validation failed"
            exit 1
          fi

          echo "::endgroup::"
        shell: bash

      # Schema consistency checks removed: CI uses orchestrator-first export and uploads artifacts for manual review.

      - name: Upload schema artifact
        uses: actions/upload-artifact@v4
        with:
          name: shimmy-frontend-contract-${{ runner.os }}
          path: ${{ env.EXPORT_SCHEMA_FILE }}
          retention-days: 30

      - name: Schema validation summary
        run: |
          echo "::group::Schema Validation Summary"
          echo "✅ Schema export validation completed successfully on ${{ runner.os }}"
          echo "📋 Summary:"
          echo "   - Schema file generated: ✅"
          echo "   - JSON format valid: ✅"
          echo "   - OpenAPI structure valid: ✅"
          echo "   - File size reasonable: ✅"

          file_size=$(wc -c < "${{ env.EXPORT_SCHEMA_FILE }}")
          echo "   - Final size: $file_size bytes"
          echo "::endgroup::"
        shell: bash

  # Verify script functionality across platforms
  cross-platform-consistency:
    name: "🔄 Cross-Platform Schema Consistency"
    needs: schema-export-validation
    runs-on: ubuntu-latest
    steps:
      - name: Download all schema artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: shimmy-frontend-contract-*
          merge-multiple: true

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Verify cross-platform consistency
        run: |
          echo "::group::Cross-platform schema consistency check"
          
          # List all downloaded schema files
          echo "Available schema files:"
          ls -la shimmy-frontend-contract-* || true
          
          # If we have multiple files, compare them
          schema_files=(shimmy-frontend-contract-*)
          
          if [ ${#schema_files[@]} -gt 1 ]; then
            echo "Comparing schemas across platforms..."
            
            first_schema="${schema_files[0]}"
            echo "Using $first_schema as reference"
            
            for schema_file in "${schema_files[@]:1}"; do
              echo "Comparing $first_schema with $schema_file"
              
              if python3 -c "import json; s1=json.load(open('$first_schema')); s2=json.load(open('$schema_file')); print('✅ Schemas identical' if s1==s2 else '⚠️ Schemas differ')"; then
                echo "Schema comparison completed"
              fi
            done
          else
            echo "ℹ️ Only one schema file found, skipping cross-platform comparison"
          fi
          
          echo "::endgroup::"
        shell: bash